name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o TactileTouch-Android-Project.zip -d project
          echo "---- extracted files ----"
          ls -R project | head -50

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: project
        run: gradle wrapper --gradle-version 8.4

      - name: Build debug APK
        working-directory: project
        run: ./gradlew assembleDebug --stacktrace

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tactile Touch (latest build)
          files: project/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
